# 감시할 웹사이트 목록
targets:
  - name: "예제 사이트 1"
    url: "http://example.com/"
    selector: "h1"
    interval_hours: 24

  - name: "뉴스 사이트"
    url: "https://news.ycombinator.com"
    selector: ".titleline"
    interval_hours: 24  # 24시간마다 체크

  - name: "프리픽스"
    url: "https://prefix.dev/blog"
    selector: "h3"
    interval_hours: 24  # 24시간마다 체크
